- name: configure catalogue for roboshop
  hosts: catalogue
  become: true
  tasks:
    - name: Enable the specific Node.js 20 stream
      ansible.builtin.dnf:
        name: "@nodejs:20"
        state: present 
    - name:  startNode.js 20 stream
      ansible.builtin.dnf:
        name: nodejs
        state: present
    - name: create user for application
      ansible.builtin.user:
        name: roboshop
        shell: /sbin/nologin
        home: /app
        system: true
        comment: "roboshop system user"
    - name: remove app directory
      ansible.builtin.file:
        path: /app
        state: absent
    - name: remove /tmp/shipping.zip path
      ansible.builtin.file:
        path: /tmp/shipping.zip
        state: absent
    - name: Create a new directory with specific permissions
      ansible.builtin.file:
        path: /app
        state: directory
    - name: down the catalogue code
      ansible.builtin.get_url:
        url: https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip
        dest: /tmp/catalogue.zip
    - name: Copy and extract local zip file to the remote server
      unarchive:
        src: /tmp/catalogue.zip
        dest: /app
        remote_src: yes
    - name: Install npm dependencies from package.json
      community.general.npm:
        path: /app
        state: present
    - name: copy catalogue service
      ansible.builtin.template:
        src: catalogue.service.j2
        dest: /etc/systemd/system/catalogue.service
    - name: copy mongo repo
      ansible.builtin.copy:
       src: mongo.repo
       dest: /etc/yum.repos.d/mongo.repo
    - name: install mongo client
      ansible.builtin.dnf:
        name: mongodb-mongosh
        state: present
    # - name: Install required collections
    #   community.general.ansible_galaxy_install:
    #     type: collection
    #     name: community.general
    #   delegate_to: localhost
    # - name: Download and install ansible.mysql from Galaxy
    #   community.general.ansible_galaxy_install:
    #     name: community.mongodb
    #     type: collection
    #   delegate_to: localhost
    # - name: Load database using a JavaScript seed file
    #   community.mongodb.mongodb_shell:
    #     login_host: "{{ MONGODB_HOST }}"
    #     file: "/app/db/master-data.js"
    - name: check catalogue schema exist ot not
      shell: mongosh --host "{{ MONGODB_HOST }}" --eval 'db.getMongo().getDBNames().indexOf("catalogue")'
      register: catalogue_output
      tags:
      - mongodb
    - name: print catalogue_output
      debug: 
        msg: "{{ catalogue_output }}"
      tags:
      - mongodb
    - name: load products
      shell: mongosh --host "{{ MONGODB_HOST }}" </app/db/master-data.js
      when: catalogue_output.stdout | int < 0
      tags:
      - mongodb
    - name: deamon reload
      systemd_service:
        name: catalogue
        daemon_reload: true
    - name: enable and start catalogue
      service:
        name: catalogue
        state: restarted
        enabled: yes
    
    