- name: configure payment service for roboshop
  hosts: payment
  become: true
  tasks:
    - name: install multiple python packages
      ansible.builtin.dnf:
        name: {{ item }}
        state: present
      loop:
        - python
        - gcc
        - python-devel    
    - name: roboshop user add
      ansible.builtin.user:
        name: roboshop
        system: true
        home: /app
        comment: "roboshop system user"
        shell: /sbin/nologin
    - name: remove app directory
      ansible.builtin.file:
        src: /app
        state: present
    - name: remove /tmp/payment.zip path
      ansible.builtin.file:
        src: /tmp/payment.zip
        state: present
    - name: Create a new directory with specific permissions
      ansible.builtin.file:
        path: /app
        state: directory
    - name: Create a new directory with specific permissions
      ansible.builtin.file:
        path: /tmp/payment.zip
        state: directory
    - name: down the payment code
      ansible.builtin.get_url:
        url: https://roboshop-artifacts.s3.amazonaws.com/payment-v3.zip
        dest: /tmp/payment.zip
    - name: Copy and extract local zip file to the remote server
      ansible.builtin.unarchive:
        src: /tmp/payment.zip
        dest: /app
        remote_src: yes
    - name: install pip with requiremens
      ansible.builtin.pip:
        requirements: /app/requirements.txt
        executable: pip3.9
    - name: copy payment service
      template:
        src: user.payment.j2
        dest: /etc/systemd/system/payment.service
    - name: load the daemon services
      ansible.builtin.systemd_service:
        name: payment 
        daemon_reload: true
        state: restarted
        enabled: true