- name: configure shipping service for roboshop
  hosts: shipping
  become: true
  tasks:
    - name: install java and maven
      ansible.builtin.dnf:
        name: maven
        state: present
    - name: roboshop user add
      ansible.builtin.user:
        name: roboshop
        system: true
        home: /app
        comment: "roboshop system user"
        shell: /sbin/nologin
    - name: remove app directory
      ansible.builtin.file:
        src: /app
        state: present
    - name: remove /tmp/shipping.zip path
      ansible.builtin.file:
        src: /tmp/shipping.zip
        state: present
    - name: Create a new directory with specific permissions
      ansible.builtin.file:
        path: /app
        state: directory
    - name: Create a new directory with specific permissions
      ansible.builtin.file:
        path: /tmp/shipping.zip
        state: directory
    - name: down the shipping code
      ansible.builtin.get_url:
        url: https://roboshop-artifacts.s3.amazonaws.com/shipping-v3.zip
        dest: /tmp/shipping.zip
    - name: Copy and extract local zip file to the remote server
      ansible.builtin.unarchive:
        src: /tmp/shipping.zip
        dest: /app
        remote_src: yes
    - name: Build Java application using Maven
      ansible.builtin.command:
        cmd: mvn clean package
        chdir: /app
      register: maven_output
    - name: Rename compiled Maven package to production file name
      ansible.builtin.command:
        cmd: mv target/shipping-1.0.jar shipping.jar
        chdir: /var/www/my-app-source/
    - name: copy the shipping service file
      ansible.builtin.template:
        src: shipping.service.j2
        dest: /etc/systemd/system/shipping.service
    - name: install mysql client library
      ansible.builtin.package:
        name: mysql
        state: present
    - name: Download and install ansible.mysql from Galaxy
      community.general.ansible_galaxy_install:
        name: ansible.mysql
        type: collection
        state: present
    - name: Import the dump file into the MySQL database
      ansible.mysql.mysql_db:
        name: all
        state: import
        target: "{{ item }}"
        login_user: "root"
        login_password: "RoboShop@1"
      loop:
        - /app/db/schema.sql
        - /app/db/app-user.sql
        - /app/db/master-data.sql
    - name: load the daemon services
      ansible.builtin.systemd_service:
        name: shipping 
        daemon_reload: true
        state: restarted
        enabled: true
